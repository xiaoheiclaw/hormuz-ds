readwise:
  token: "${READWISE_TOKEN}"
  tag: "hormuz"
  sources:
    - "CENTCOM"
    - "Reuters"
    - "Lloyd's List"
    - "TradeWinds"
    - "IMO"
    - "OilPrice.com"
    - "Iran International"
  proxy: "http://127.0.0.1:7890"
  timeout: 30

llm:
  backend: "openclaw"
  openclaw:
    endpoint: "${OPENCLAW_ENDPOINT}"
  claude_api:
    model: "claude-sonnet-4-6"

conflict:
  start_date: "2026-03-01"

update:
  interval_hours: 4

db:
  path: "data/hormuz.db"
