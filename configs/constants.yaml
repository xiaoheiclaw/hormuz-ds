# Physical constants — fixed, never change at runtime

physical:
  q1:
    C1:
      name: "coastline_terrain"
      description: "IRGC coastal terrain advantage — caves, tunnels, mobile TELs"
    C2:
      name: "channel_width"
      value_km: 9
      description: "Navigable channel width at narrowest point"
  q2:
    C3:
      name: "sweep_area"
      description: "Total area requiring mine clearance in transit lanes"
    C4:
      name: "mine_types"
      types: ["contact", "magnetic", "acoustic"]
      description: "Known Iranian mine inventory types"
    C5:
      name: "single_ship_sweep_rate_ceiling"
      description: "Maximum area one MCM vessel can clear per day"

# ACH evidence definitions

ach:
  q1:
    hypotheses:
      h1: "Active IRGC campaign (high disruption)"
      h2: "Limited/signaling strikes (moderate disruption)"
      h3: "Deterred/restrained (minimal disruption)"
    evidence:
      - id: "q1_e1"
        name: "ASBM launch rate"
        discriminating_power: "high"
        h1: "consistent"
        h2: "consistent"
        h3: "inconsistent"
        source: "CENTCOM/ISR"
        frequency: "daily"
      - id: "q1_e2"
        name: "FAC sortie count"
        discriminating_power: "high"
        h1: "consistent"
        h2: "neutral"
        h3: "inconsistent"
        source: "CENTCOM/ISR"
        frequency: "daily"
      - id: "q1_e3"
        name: "Mine-laying boat departures"
        discriminating_power: "high"
        h1: "consistent"
        h2: "neutral"
        h3: "inconsistent"
        source: "ISR/AIS"
        frequency: "daily"
      - id: "q1_e4"
        name: "IRGCN submarine activity"
        discriminating_power: "medium"
        h1: "consistent"
        h2: "neutral"
        h3: "inconsistent"
        source: "CENTCOM/ISR"
        frequency: "daily"
      - id: "q1_e5"
        name: "Coastal radar/C2 emissions"
        discriminating_power: "medium"
        h1: "consistent"
        h2: "consistent"
        h3: "neutral"
