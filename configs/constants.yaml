# Physical constants — fixed, never change at runtime

physical:
  q1:
    C1:
      name: "coastline_terrain"
      description: "IRGC coastal terrain advantage — caves, tunnels, mobile TELs"
    C2:
      name: "channel_width"
      value_km: 9
      description: "Navigable channel width at narrowest point"
  q2:
    C3:
      name: "sweep_area"
      description: "Total area requiring mine clearance in transit lanes"
    C4:
      name: "mine_types"
      types: ["contact", "magnetic", "acoustic"]
      description: "Known Iranian mine inventory types"
    C5:
      name: "single_ship_sweep_rate_ceiling"
      description: "Maximum area one MCM vessel can clear per day"

# ACH evidence definitions

ach:
  q1:
    hypotheses:
      # v5.4: H1=depletion, H2=preservation, H3=resupply (suspended)
      h1: "Capability depleting — closed system, irreversible decay"
      h2: "Capability preserved — strategic rationing, C2 intact"
      h3: "External resupply (SUSPENDED — Mehrabad airport destroyed)"
    evidence:
      # v5.4: non-visual high-frequency ACH (satellite 14-day delay)
      - id: "q1_e1"
        name: "Attack frequency 2nd derivative"
        discriminating_power: "high"
        h1: "accelerating decline (convex)"
        h2: "steady or unexplained plateau"
        source: "CENTCOM communiques"
        frequency: "weekly"
      - id: "q1_e2"
        name: "Attack coordination"
        discriminating_power: "high"
        h1: "degrading to unidirectional/scattered"
        h2: "maintains multi-vector swarm sync"
        source: "battle report cross-analysis"
        frequency: "weekly"
      - id: "q1_e3"
        name: "Munition consumption downgrade ratio"
        discriminating_power: "high"
        h1: "high-end missiles extinct, cheap drone attrition"
        h2: "reduced rate but retains high-end penetration spearhead"
        source: "OSINT weapon identification"
        frequency: "daily"
      - id: "q1_e4"
        name: "EW GPS/AIS spoofing complexity"
        discriminating_power: "high"
        h1: "degrades to brute jamming or disappears"
        h2: "maintains complex geometric spoofing"
        source: "maritime commercial AI platforms"
        frequency: "realtime"
      - id: "q1_e5"
        name: "Mosaic defense geographic fragmentation"
        discriminating_power: "medium"
        h1: "only deep mountain isolated positions remain"
        h2: "shallow + coastal multi-node alternating fire"
        source: "OSINT launch-source geolocations"
        frequency: "weekly"

  q2:
    hypotheses:
      # v5.4: actuarial proxy validation — insurance reflects physical threats
      h1: "Sweep effective — mines clearing"
      h2: "Mines persistent — density uncontrolled"
    evidence:
      # v5.4: insurance/freight as actuarial proxy, not causal driver
      - id: "q2_e1"
        name: "Hull war risk additional premium (AP)"
        discriminating_power: "high"
        h1: "falling below 1% of hull value"
        h2: "surging/holding 1-3% extreme"
        source: "Lloyd's/brokers"
        frequency: "daily"
      - id: "q2_e2"
        name: "P&I club extended clause"
        discriminating_power: "high"
        h1: "restoring standard cover"
        h2: "72h cancellation trigger, per-voyage approval"
        source: "International P&I clubs"
        frequency: "daily"
      - id: "q2_e3"
        name: "VLCC spot TD3 freight rate"
        discriminating_power: "high"
        h1: "freight retreating from extreme, volume recovering"
        h2: "W400+ surge, no bids"
        source: "Baltic Exchange"
        frequency: "daily"

# Signal definitions

signals:
  grabo_tripwires:
    # v5.4: T1 split by GPS spoofing + attack frequency co-occurrence
    - id: "T1a"
      name: "GPS spoofing + attack frequency rising"
      description: "Offensive H2 confirmation — C2 intact and actively engaging"
      revert_hours: 48
    - id: "T1b"
      name: "GPS spoofing + attack frequency declining"
      description: "Defensive H2 confirmation — C2 intact but strategic hibernation"
      revert_hours: 48
    - id: "T2"
      name: "Multi-region activation"
      description: "Simultaneous IRGC activity across multiple sectors"
      revert_hours: 48
    - id: "T3"
      name: "Mining boats departing"
      description: "Mine-laying vessels leaving port"
      revert_hours: 48

  event_triggers:
    - id: "E1"
      name: "Infrastructure attack"
      description: "Strike on port/terminal/pipeline infrastructure"
      revert_hours: null
      cross_layer: "schelling_4"
    - id: "E2"
      name: "Minesweeper attack"
      description: "Attack on MCM vessel during clearance ops"
      revert_hours: null
    - id: "E3"
      name: "Mine strike"
      description: "Vessel strikes mine in transit lane"
      revert_hours: null
    - id: "E4"
      name: "New area mining"
      description: "Mines detected in previously clear area"
      revert_hours: 48

  confirmations:
    - id: "C1"
      name: "Non-Iranian weapons"
      description: "Evidence of non-Iranian state weapons in theater"
    - id: "C2"
      name: "Mines in cleared lanes"
      description: "Re-mining of lanes declared clear"

# Schelling signal table

schelling:
  min_week: 4  # No delta output before this week
  delta_cap: 0.10  # Max absolute delta per call (10pp)
  signals:
    - id: 1
      name: "External mediator engagement"
      class: "A"
      description: "Third-party mediation effort (e.g., Oman, Qatar, China)"
      requires_combo: null
      delta: {a: 0.05, c: -0.03}
    - id: 2
      name: "US signal inconsistency"
      class: "A"
      description: "Contradictory US messaging suggesting internal policy conflict"
      requires_combo: null
      delta: {a: 0.03, c: 0}
    - id: 3
      name: "Costly self-binding"
      class: "A"
      description: "One side makes costly commitment to de-escalation"
      requires_combo: null
      delta: {a: 0.05, c: 0}
    - id: 4
      name: "IRGC infrastructure escalation"
      class: "A"
      description: "IRGC escalation against oil infrastructure (cross-layer with E1)"
      requires_combo: null
      delta: {a: -0.05, c: 0.10}
    - id: 5
      name: "Peace window"
      class: "B"
      description: "Diplomatic window opening — requires combo to confirm"
      requires_combo: [1, 3]
      delta: {a: 0.03, c: 0}
    - id: 6
      name: "IRGC fragmentation"
      class: "B"
      description: "Signs of IRGC internal disagreement — requires combo to confirm"
      requires_combo: [2]
      delta: {a: 0.02, c: 0}

# Calibration references

calibration:
  references:
    - name: "Operation Praying Mantis"
      year: 1988
      description: "US-Iran naval engagement; one-day operation, limited escalation"
      relevance: "Baseline for Q1 active disruption scenario duration"
    - name: "Gulf War mine clearance"
      year: 1991
      description: "Post-war MCM operations in Persian Gulf"
      relevance: "Calibration for Q2 sweep timeline estimates"
    - name: "Wonsan mine blockade"
      year: 1950
      description: "Korean War — 3000 mines, 2-week delay for amphibious landing"
      relevance: "Upper bound calibration for dense mine scenario"
