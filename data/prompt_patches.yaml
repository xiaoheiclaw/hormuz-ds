# Prompt patches — 方法论层面的提取规则改进
# 来源：hormuz review 的 LLM 审查建议，经人工确认后写入
# 格式：每条 patch 有 date(采纳日期)、obs_id(影响的观测)、rule(规则内容)
# 这些规则会追加到 LLM 提取 prompt 末尾

patches:
  - date: "2026-03-16"
    obs_id: "general"
    rule: "区分'危机溢出效应'（民航中断、油价波动、邻国经济压力）和'冲突升级信号'（交战规模扩大、新武器系统使用、新参战方）。前者只影响市场类观测(O07-O09/O12)，不应推动能力类观测(O01-O06)"
  - date: "2026-03-16"
    obs_id: "general"
    rule: "第三国外交表态（呼吁/谴责/抗议/呼吁停火）有饱和效应：同一批次多篇外交新闻只算一次信号，不因文章数量放大"
  - date: "2026-03-17"
    obs_id: "O01/O03"
    rule: "O01/O03 变动需要具体交战数据支撑（被击落数量、拦截成功率、攻击波次、CENTCOM 战果通报）。'仍遭袭击'或'摧毁能力但仍遭袭'等矛盾性描述不构成变动依据"
  - date: "2026-03-17"
    obs_id: "general"
    rule: "忽略与霍尔木兹军事冲突无直接关联的文章（体育、纯人道主义、其他地区冲突、智库泛论）。这些文章不应影响任何观测值"
